name: CI

# Plans.md task 0.6 — build + test + clippy + fmt on every push and PR.
on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: build · test · clippy · fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rustfmt + clippy
        run: rustup component add rustfmt clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # The browser-driven tests are #[ignore]d and need a pinned Chromium, so
      # the default test run stays hermetic and needs no browser on the runner.
      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

  # Guards the MSRV and that the crates.io crates still package cleanly, so the
  # first real publish isn't a surprise (Plans.md 13.4). MSRV (1.88) is the floor
  # validated locally — building amber-core/amber-cli on it; bump if a dep needs
  # newer. The dry-run packages + verify-compiles amber-core (amber-cli's path
  # dep on core can't resolve from the registry until core is published, so it's
  # published-then-polled in release.yml, not dry-run here).
  release-readiness:
    name: MSRV 1.88 · publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Build published crates on MSRV
        run: cargo build -p amber-core -p amber-cli --locked
      - name: Packaging check (amber-core)
        run: cargo publish -p amber-core --dry-run --locked

  # API-stability guard for 1.0 (Plans.md 15.1): diff amber-core's public API
  # against the committed baseline (crates/amber-core/public-api.txt) so every
  # change to the public surface — especially the FFI/binding contract — is
  # explicit and reviewed. Nightly is pinned for reproducible rustdoc-JSON output;
  # refresh the baseline (and this pin) intentionally when the API changes.
  public-api:
    name: public API surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-24
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-public-api
        run: cargo install cargo-public-api --locked
      - name: Diff public API against the committed baseline
        run: |
          set -euo pipefail
          cargo +nightly-2026-05-24 public-api -p amber-core --simplified > /tmp/current-api.txt
          if ! diff -u crates/amber-core/public-api.txt /tmp/current-api.txt; then
            echo "::error::amber-core's public API changed. If intended, refresh the baseline:"
            echo "  cargo +nightly-2026-05-24 public-api -p amber-core --simplified > crates/amber-core/public-api.txt"
            exit 1
          fi
