name: Bindings

# Build/compile every language binding on each push and PR so packaging or
# binding-API regressions are caught early. These jobs are hermetic: they
# compile and link the bindings (cgo/JNA/P-Invoke/xcframework) but do not run
# the live-browser smoke tests (those need a pinned Chromium and run locally),
# mirroring ci.yml where browser tests are #[ignore]d.

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  unix-bindings:
    name: ruby · go · kotlin · csharp (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2

      # --- C ABI: build the cdylib, then compile + link + run the C example
      #     against include/amber.h. This proves the hand-maintained header
      #     matches the exported symbols (catches drift; Plans.md 13.2). The
      #     example uses a bad URL, so it stays browser-free. ---
      - name: C ABI header + example
        run: |
          cargo build -p amber-core --release --lib
          cc examples/c/example.c -I include -L target/release -lamber_core -o /tmp/amber_c
          LD_LIBRARY_PATH=target/release /tmp/amber_c

      # --- Ruby (UniFFI + ffi): generate, then load the library (binds symbols
      #     via dlopen) without capturing. ---
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Ruby binding loads
        run: |
          gem install ffi --no-document
          bindings/ruby/generate.sh
          ruby -e 'require_relative "bindings/ruby/lib/amber_html"; abort("capture missing") unless AmberHtml.respond_to?(:capture)'

      # --- Go (cgo): compile + link the test binary without running it. ---
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Go binding builds
        run: |
          bindings/go/generate.sh
          cd bindings/go
          go vet ./...
          go test -run "^$" ./...   # compile + link, run zero tests

      # --- Kotlin (UniFFI + JNA): compile main + test sources. ---
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"
      - name: Kotlin binding compiles
        run: |
          bindings/kotlin/generate.sh
          cd bindings/kotlin
          gradle --no-daemon compileTestKotlin

      # --- C# (.NET P/Invoke): build the library + test project. ---
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: C# binding builds
        run: |
          bindings/csharp/generate.sh
          cd bindings/csharp
          # No solution file here; build the library + test projects explicitly
          # (the test project's ProjectReference pulls in the library too).
          dotnet build tests/AmberHtml.Tests/AmberHtml.Tests.csproj

      # --- Node (napi-rs): build the addon + run the hermetic smoke (the smoke
      #     only asserts the export surface + that a bad URL throws). ---
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Node binding loads
        run: |
          cargo build -p amber-node --release
          cp target/release/libamber_node.so crates/amber-node/amber.node
          node crates/amber-node/__test__/smoke.test.js

      # --- Python (UniFFI): generate the module, then import + assert a bad URL
      #     raises (hermetic; no browser). ---
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python binding loads
        run: |
          cargo build -p amber-core --release --lib
          cargo run -q -p uniffi-bindgen -- generate \
            --library target/release/libamber_core.so --language python --out-dir /tmp/amberpy
          cp target/release/libamber_core.so /tmp/amberpy/
          PYTHONPATH=/tmp/amberpy python - <<'PY'
          import amber_core
          try:
              amber_core.capture_markdown("not a url")
              raise SystemExit("expected a CaptureError for a bad URL")
          except amber_core.CaptureError:
              print("ok")
          PY

  swift-binding:
    name: swift (build)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Swift binding builds
        run: |
          bindings/swift/build-xcframework.sh
          bindings/swift/generate.sh
          cd bindings/swift
          swift build

  # Long-tail C-ABI / NIF bindings (Plans.md 11). Hermetic: each step
  # loads/compiles the binding and exercises the bad-URL path (which fails at URL
  # parse, before any browser), so no pinned Chromium is needed — mirroring the
  # other jobs. Full capture smokes run locally against a real browser.
  long-tail-bindings:
    name: php · lua · dart · elixir (build/load)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2

      # PHP (FFI): load the library + assert a bad URL throws.
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: ffi
          ini-values: ffi.enable=1
      - name: PHP binding loads
        run: |
          bindings/php/generate.sh
          php -r 'require "bindings/php/src/Amber.php"; try { Amber\Amber::captureMarkdown("not a url"); exit(1); } catch (Amber\CaptureException $e) { echo "ok\n"; }'

      # Lua (LuaJIT FFI): load the module + assert a bad URL errors.
      - name: Install LuaJIT
        run: sudo apt-get update && sudo apt-get install -y luajit
      - name: Lua binding loads
        run: |
          bindings/lua/generate.sh
          cd bindings/lua
          luajit -e 'local a = require("amber"); assert(not pcall(function() a.capture_markdown("not a url") end), "bad URL should error"); print("ok")'

      # Dart (dart:ffi): resolve deps + static analysis (compile-check).
      - uses: dart-lang/setup-dart@v1
      - name: Dart binding analyzes
        run: |
          bindings/dart/generate.sh
          cd bindings/dart
          dart pub get
          dart analyze

      # Elixir (rustler NIF): compile the Elixir wrapper + the Rust NIF.
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.17"
      - name: Elixir binding compiles
        run: |
          cd bindings/elixir
          mix deps.get
          mix compile

      # NOTE: R (bindings/r) is intentionally not wired here. Its .Call shim
      # links amber-core as an external dylib, whose rpath/loader resolution is
      # environment-specific and unvalidated (no R locally). Rather than add a
      # non-blocking "fake green" step, R's CI coverage is a documented gap
      # (Plans.md 11.4 / 13.3) pending an R + linking environment to validate it.
