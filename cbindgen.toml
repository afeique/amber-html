# cbindgen config for the AmberHTML C ABI (Plans.md 6.2).
#
# Regenerate the header with:
#   cbindgen --config cbindgen.toml --crate amber-core --output include/amber.h
#
# The committed include/amber.h is hand-maintained to match capi.rs; this config
# lets the header be regenerated mechanically once cbindgen is available.

language = "C"
include_guard = "AMBER_H"
autogen_warning = "/* Generated by cbindgen. Do not edit by hand. */"
cpp_compat = true
style = "type"

[export]
# Allowlist the full C-ABI surface in capi.rs so a regenerated header never
# drifts from it. Keep this in sync when adding/removing `amber_*` symbols.
# (No `prefix` here: the Rust symbols already carry the `amber_` prefix —
# setting one would double it.)
include = [
  # Status codes.
  "AMBER_OK", "AMBER_ERR_INVALID_INPUT", "AMBER_ERR_CAPTURE",
  # Output-format selectors.
  "AMBER_FORMAT_HTML", "AMBER_FORMAT_MHTML", "AMBER_FORMAT_MARKDOWN",
  "AMBER_FORMAT_READABLE", "AMBER_FORMAT_WARC", "AMBER_FORMAT_WACZ",
  "AMBER_FORMAT_SCREENSHOT", "AMBER_FORMAT_PDF",
  # Functions.
  "amber_capture_markdown", "amber_capture_readable", "amber_capture",
  "amber_save", "amber_string_free", "amber_bytes_free",
  # Capture-once handle (Plans.md 10.1).
  "AmberSnapshot", "amber_snapshot", "amber_snapshot_render",
  "amber_snapshot_text", "amber_snapshot_save", "amber_snapshot_free",
]

[defines]
