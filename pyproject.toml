# Python packaging for AmberHTML via maturin + UniFFI (Plans.md 6.1).
#
# The UniFFI bindings are generated from the amber-core cdylib (verified working:
# `cargo run -p uniffi-bindgen -- generate --library <dylib> --language python`
# produces an importable `amber_core` module exposing capture_markdown/readable).
#
# Build + install the wheel with maturin:
#   pip install maturin
#   maturin build --release        # wheel under target/wheels/
#   pip install target/wheels/amber_html-*.whl
#
# STATUS (6.1, done): validated end-to-end — `maturin build` produces a wheel
# (it invokes the uniffi-bindgen crate to generate the bindings), and the
# pip-installed wheel imports as `amber_core` and runs capture_markdown/readable.
# PyPI publish (`maturin publish` / per-platform wheels) is the only remaining
# distribution step.
[build-system]
requires = ["maturin>=1.5,<2"]
build-backend = "maturin"

[project]
name = "amber-html"
description = "Local-first web-capture engine (Python bindings via UniFFI)."
requires-python = ">=3.8"
license = { text = "MIT OR Apache-2.0" }
readme = "README.md"
dynamic = ["version"]

[tool.maturin]
bindings = "uniffi"
manifest-path = "crates/amber-core/Cargo.toml"
# The generated module is `amber_core`, exposing capture_markdown(url) /
# capture_readable(url) (see crates/amber-core/src/ffi.rs).
module-name = "amber_core"
